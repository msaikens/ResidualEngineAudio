name: Release Unity Package

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Windows smoke test
        shell: pwsh
        run: .\scripts\test-smoke-windows.ps1

      - name: Read package version
        id: package
        shell: pwsh
        run: |
          $json = Get-Content .\unity\com.residual.voice\package.json -Raw | ConvertFrom-Json
          "version=$($json.version)" >> $env:GITHUB_OUTPUT
          "name=$($json.name)" >> $env:GITHUB_OUTPUT

      - name: Create package zip
        shell: pwsh
        run: |
          $packageName = "${{ steps.package.outputs.name }}"
          $packageVersion = "${{ steps.package.outputs.version }}"
          $zipName = "$packageName-$packageVersion.zip"

          if (Test-Path "artifacts") {
            Remove-Item -Recurse -Force "artifacts"
          }

          New-Item -ItemType Directory -Force artifacts | Out-Null

          Compress-Archive `
            -Path ".\unity\com.residual.voice\*" `
            -DestinationPath ".\artifacts\$zipName" `
            -Force

          "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-package
          path: artifacts/*.zip

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true