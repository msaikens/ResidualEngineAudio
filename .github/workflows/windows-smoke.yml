name: Windows Smoke Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run smoke test
        shell: pwsh
        run: .\scripts\test-smoke-windows.ps1

      - name: Upload Unity package DLL
        uses: actions/upload-artifact@v4
        with:
          name: residual_voice_windows_x64
          path: unity/com.residual.voice/Runtime/Plugins/Windows/x86_64/residual_voice.dll